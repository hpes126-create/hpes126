<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>學生讀書計畫管理系統</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fffafc;
}

nav {
  background: #ffd6e7;
  color: #333;
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  font-family: "Microsoft JhengHei", Arial;
}

nav button {
  background: transparent;
  color: #444;
  border: none;
  padding: 8px 14px;
  cursor: pointer;
  border-radius: 6px;
}

nav button:hover {
  background: rgba(0,0,0,0.08);
}

.container {
  padding: 20px;
}

.hidden {
  display: none;
}

.layout {
  display: flex;
  gap: 20px;
}

.left, .right {
  flex: 1;
  padding: 20px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.05);
}

input {
  padding: 8px;
  margin: 5px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.task {
  margin-left: 20px;
}

.done {
  text-decoration: line-through;
  color: gray;
}

/* 行事曆 */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  border: 1px solid #ccc;
  min-height: 90px;
  padding: 5px;
  cursor: pointer;
  border-radius: 8px;
  background: white;
}

.today {
  background: #ffe4ef;
  border: 2px solid #ff8ab5;
}

.selected {
  background: #ffb3d1;
  border: 2px solid #ff4d94;
}

.plan {
  background: #ffd6e7;
  margin-top: 3px;
  padding: 2px;
  font-size: 11px;
  border-radius: 3px;
}

/* 成績 */
.up {
  color: green;
  font-weight: bold;
}

.down {
  color: red;
  font-weight: bold;
}

.score-card {
  border: 1px solid #ddd;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  background: white;
}
</style>
</head>

<body>

<nav>
  <button onclick="location.hash='login'">登入</button>
  <button onclick="location.hash='register'">註冊</button>
  <button onclick="location.hash='app'">讀書計畫</button>
  <button onclick="location.hash='score'">成績分析</button>
  <button onclick="logout()">登出</button>
</nav>

<!-- 登入 -->
<div id="login" class="container">
  <h2>🔐 登入</h2>

  <input id="loginUser" placeholder="帳號">
  <input id="loginPass" type="password" placeholder="密碼">

  <button onclick="login()">登入</button>
</div>

<!-- 註冊 -->
<div id="register" class="container hidden">
  <h2>📝 註冊</h2>

  <input id="regUser" placeholder="帳號">
  <input id="regPass" type="password" placeholder="密碼">

  <button onclick="register()">註冊</button>
</div>

<!-- 系統 -->
<div id="app" class="container hidden">

  <div class="layout">

    <!-- 左 -->
    <div class="left">

      <h1>📚 學生讀書計畫管理系統</h1>

      <h2>➕ 建立讀書計畫</h2>

      <input id="student" placeholder="計畫名稱">
      <input id="planTitle" placeholder="任務內容">
      <input id="planDate" type="date">

      <button onclick="addPlan()">新增計畫</button>

      <h2>📋 計畫列表</h2>

      <div id="plans"></div>

    </div>

    <!-- 右 -->
    <div class="right">

      <h2>
        📅 <span id="monthTitle"></span>

        <button onclick="changeMonth(-1)">◀</button>
        <button onclick="changeMonth(1)">▶</button>
      </h2>

      <div id="calendar" class="calendar"></div>

      <h3>📌 當日計畫</h3>

      <div id="dayDetail"></div>

    </div>

  </div>

</div>

<!-- 成績分析 -->
<div id="score" class="container hidden">

  <h1>📊 成績分析系統</h1>

  <input id="scoreSubject" placeholder="科目">
  <input id="scoreValue" type="number" placeholder="成績">
  <input id="scoreDate" type="date">

  <button onclick="addScore()">新增成績</button>

  <hr>

  <div id="scoreList"></div>

</div>

<script>
/* ===== 安全讀取 ===== */

function safeLoad(key) {
  try {
    return JSON.parse(localStorage.getItem(key)) || [];
  } catch(e) {
    return [];
  }
}

let users = safeLoad('users');
let plans = safeLoad('plans');
let scores = safeLoad('scores');

let currentUser = null;
let currentMonth = new Date();
let selectedDate = null;

/* ===== 頁面 ===== */

function showPage(page) {

  if ((page === 'app' || page === 'score') && !currentUser) {
    alert('請先登入');
    return;
  }

  ['login','register','app','score'].forEach(id => {
    document.getElementById(id).classList.add('hidden');
  });

  document.getElementById(page).classList.remove('hidden');
}

/* ===== 註冊 ===== */

function register() {

  const u = regUser.value;
  const p = regPass.value;

  if (!u || !p) {
    alert('請輸入完整資料');
    return;
  }

  users.push({u,p});

  localStorage.setItem('users', JSON.stringify(users));

  alert('註冊成功');

  showPage('login');
}

/* ===== 登入 ===== */

function login() {

  const found = users.find(x =>
    x.u === loginUser.value &&
    x.p === loginPass.value
  );

  if (!found) {
    alert('帳號或密碼錯誤');
    return;
  }

  currentUser = loginUser.value;

  alert('登入成功');

  showPage('app');

  render();
  renderCalendar();
  renderScores();
}

/* ===== 登出 ===== */

function logout() {
  currentUser = null;
  showPage('login');
}

/* ===== 計畫 ===== */

function addPlan() {

  const student = document.getElementById('student').value;
  const title = document.getElementById('planTitle').value;
  const date = document.getElementById('planDate').value;

  if (!student || !title || !date) {
    alert("請輸入完整資料");
    return;
  }

  plans.push({
    id: Date.now(),
    student,
    title,
    date,
    tasks: [],
    owner: currentUser
  });

  student.value = '';
  planTitle.value = '';
  planDate.value = '';

  save();
}

function addTask(planId) {

  const taskName = prompt("輸入任務名稱");

  if (!taskName) return;

  const plan = plans.find(p => p.id === planId);

  plan.tasks.push({
    id: Date.now(),
    name: taskName,
    done: false
  });

  save();
}

function toggleTask(planId, taskId) {

  const task = plans
    .find(p => p.id === planId)
    .tasks.find(t => t.id === taskId);

  task.done = !task.done;

  save();
}

function editTask(planId, taskId) {

  const task = plans
    .find(p => p.id === planId)
    .tasks.find(t => t.id === taskId);

  const newName = prompt("修改任務名稱", task.name);

  if (!newName) return;

  task.name = newName;

  save();
}

function deleteTask(planId, taskId) {

  if (!confirm("確定刪除任務？")) return;

  const plan = plans.find(p => p.id === planId);

  plan.tasks = plan.tasks.filter(t => t.id !== taskId);

  save();
}

function editPlan(planId) {

  const plan = plans.find(p => p.id === planId);

  const newTitle = prompt("修改計畫名稱", plan.title);

  if (!newTitle) return;

  plan.title = newTitle;

  save();
}

function deletePlan(planId) {

  if (!confirm("確定刪除計畫？")) return;

  plans = plans.filter(p => p.id !== planId);

  save();
}

/* ===== 儲存 ===== */

function save() {

  localStorage.setItem('plans', JSON.stringify(plans));

  render();
  renderCalendar();
}

/* ===== 顯示計畫 ===== */

function render() {

  const container = document.getElementById('plans');

  container.innerHTML = '';

  plans
    .filter(p => p.owner === currentUser)
    .forEach(plan => {

      const div = document.createElement('div');

      div.innerHTML = `
        <h3>
          📚 ${plan.student} - ${plan.title} (${plan.date})

          <button onclick="editPlan(${plan.id})">✏️</button>

          <button onclick="deletePlan(${plan.id})">🗑️</button>
        </h3>

        <button onclick="addTask(${plan.id})">
          ➕ 新增任務
        </button>

        <ul>

          ${plan.tasks.map(task => `

            <li class="task ${task.done ? 'done' : ''}">

              <input
                type="checkbox"
                ${task.done ? 'checked' : ''}

                onclick="toggleTask(${plan.id}, ${task.id})"
              >

              ${task.name}

              <button onclick="editTask(${plan.id}, ${task.id})">
                ✏️
              </button>

              <button onclick="deleteTask(${plan.id}, ${task.id})">
                🗑️
              </button>

            </li>

          `).join('')}

        </ul>

        <hr>
      `;

      container.appendChild(div);
    });
}

/* ===== 顯示當天 ===== */

function showDayDetail(dateStr) {

  const container = document.getElementById('dayDetail');

  const dayPlans = plans.filter(p =>
    p.owner === currentUser &&
    p.date === dateStr
  );

  if (dayPlans.length === 0) {

    container.innerHTML = '這天沒有計畫';

    return;
  }

  container.innerHTML = dayPlans.map(plan => `

    <div>

      <b>📚 ${plan.student} - ${plan.title}</b>

      <ul>

        ${plan.tasks.map(t => `

          <li class="${t.done ? 'done' : ''}">
            ${t.done ? '✅' : '⬜'} ${t.name}
          </li>

        `).join('')}

      </ul>

    </div>

  `).join('');
}

/* ===== 行事曆 ===== */

function renderCalendar() {

  const cal = document.getElementById('calendar');

  cal.innerHTML = '';

  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();

  monthTitle.innerText = `${year} 年 ${month + 1} 月`;

  const today = new Date();

  const firstDay = new Date(year, month, 1).getDay();

  const days = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    cal.innerHTML += `<div></div>`;
  }

  for (let d = 1; d <= days; d++) {

    const dateStr =
      `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    const dayPlans = plans.filter(p =>
      p.owner === currentUser &&
      p.date === dateStr
    );

    const isToday =
      d === today.getDate() &&
      month === today.getMonth() &&
      year === today.getFullYear();

    let className = 'day';

    if (isToday) className += ' today';

    if (selectedDate === dateStr) className += ' selected';

    const div = document.createElement('div');

    div.className = className;

    div.onclick = () => {

      selectedDate = dateStr;

      document.getElementById('planDate').value = dateStr;

      showDayDetail(dateStr);

      renderCalendar();
    };

    div.innerHTML = `
      <b>${d}</b>

      ${dayPlans.map(p => `
        <div class="plan">${p.student}</div>
      `).join('')}
    `;

    cal.appendChild(div);
  }
}

function changeMonth(offset) {

  currentMonth.setMonth(
    currentMonth.getMonth() + offset
  );

  renderCalendar();
}

/* ===== 成績 ===== */

function addScore() {

  const subject = scoreSubject.value;
  const value = Number(scoreValue.value);
  const date = scoreDate.value;

  if (!subject || !value || !date) {
    alert("請輸入完整資料");
    return;
  }

  scores.push({
    subject,
    value,
    date,
    owner: currentUser
  });

  localStorage.setItem('scores', JSON.stringify(scores));

  renderScores();

  scoreSubject.value = '';
  scoreValue.value = '';
  scoreDate.value = '';
}

function renderScores() {

  const container = document.getElementById('scoreList');

  const myScores =
    scores.filter(s => s.owner === currentUser);

  if (myScores.length === 0) {

    container.innerHTML = '尚無成績';

    return;
  }

  const subjects = [
    ...new Set(myScores.map(s => s.subject))
  ];

  container.innerHTML = subjects.map(subject => {

    const subjectScores = myScores
      .filter(s => s.subject === subject)
      .sort((a,b) =>
        new Date(a.date) - new Date(b.date)
      );

    let trend = '';

    if (subjectScores.length >= 2) {

      const last =
        subjectScores[subjectScores.length - 1].value;

      const prev =
        subjectScores[subjectScores.length - 2].value;

      if (last > prev) {

        trend =
          `<span class="up">
            📈 進步 +${last - prev}
          </span>`;

      } else if (last < prev) {

        trend =
          `<span class="down">
            📉 退步 ${last - prev}
          </span>`;

      } else {

        trend = `➖ 無變化`;
      }
    }

    const graph = subjectScores.map(s => `

      <div style="
        width:30px;
        height:${s.value * 2}px;
        background:#ff8ab5;
        margin-right:5px;
        display:flex;
        align-items:flex-end;
        justify-content:center;
        color:white;
        border-radius:6px 6px 0 0;
        font-size:10px;
      ">
        ${s.value}
      </div>

    `).join('');

    return `

      <div class="score-card">

        <h3>${subject}</h3>

        ${trend}

        <p>

          ${subjectScores.map(s => `
            ${s.date}：${s.value}
          `).join('<br>')}

        </p>

        <div style="
          display:flex;
          align-items:flex-end;
          height:220px;
          margin-top:10px;
        ">

          ${graph}

        </div>

      </div>

    `;

  }).join('');
}

/* ===== 路由 ===== */

function handleRoute() {

  const hash = location.hash.replace('#','');

  showPage(hash || 'login');
}

window.addEventListener('hashchange', handleRoute);

handleRoute();
</script>

</body>
</html>
